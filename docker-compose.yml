version: '3.8'

services:
  mobisenior:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_CLAUDE_API_KEY: ${VITE_CLAUDE_API_KEY}
        VITE_ELEVENLABS_API_KEY: ${VITE_ELEVENLABS_API_KEY}
        VITE_ELEVENLABS_VOICE_ID: ${VITE_ELEVENLABS_VOICE_ID}
        VITE_N8N_WEBHOOK_SOS: ${VITE_N8N_WEBHOOK_SOS}
        VITE_N8N_WEBHOOK_CITA: ${VITE_N8N_WEBHOOK_CITA}
    container_name: mobisenior
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production

networks:
  default:
    name: mobilcity-network
    external: true
